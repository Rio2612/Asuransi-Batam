<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#132040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0d080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M16 2 L28 7 L28 16 C28 22.5 22.5 28 16 30 C9.5 28 4 22.5 4 16 L4 7 Z"
        fill="url(#shieldGrad)"
        stroke="url(#goldGrad)"
        stroke-width="1.2"/>

  <!-- Gold inner shield accent line -->
  <path d="M16 4.5 L26 9 L26 16 C26 21.2 21.5 26.2 16 28 C10.5 26.2 6 21.2 6 16 L6 9 Z"
        fill="none"
        stroke="#c9a84c"
        stroke-width="0.4"
        opacity="0.4"/>

  <!-- Text AB -->
  <text x="16" y="21"
        font-family="Georgia, serif"
        font-size="11"
        font-weight="bold"
        fill="url(#goldGrad)"
        text-anchor="middle"
        letter-spacing="0.5">AB</text>
</svg>
